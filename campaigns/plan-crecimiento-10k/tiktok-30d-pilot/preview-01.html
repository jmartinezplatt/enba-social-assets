<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENBA TikTok Preview 01</title>
  <link rel="stylesheet" href="preview.css">
</head>
<body data-group="1">
  <main class="shell">
    <section class="hero">
      <div class="hero-card">
        <div class="eyebrow">Preview HTML · Grupo 1</div>
        <h1 id="group-title"></h1>
        <p id="group-description"></p>
      </div>
      <div class="hero-stats">
        <div class="summary-card">
          <div class="summary-label">Bloque</div>
          <div class="summary-value">01</div>
          <div class="summary-note">Primera tanda para instalar tono y universo visual.</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Cantidad</div>
          <div class="summary-value" id="piece-count"></div>
          <div class="summary-note">Hooks de arranque y baja fricción.</div>
        </div>
      </div>
    </section>

    <nav class="nav" id="nav"></nav>

    <section class="group-meta">
      <div>
        <h2>Revisión editorial</h2>
        <p>Este bloque funciona como apertura del canal: menos venta directa, más descubrimiento, clima y acceso emocional.</p>
      </div>
      <div class="group-pill" id="group-pill"></div>
    </section>

    <section class="pieces-grid" id="pieces"></section>
  </main>
  <script src="tiktok-pieces.js"></script>
  <script src="preview.js"></script>
</body>
</html>
