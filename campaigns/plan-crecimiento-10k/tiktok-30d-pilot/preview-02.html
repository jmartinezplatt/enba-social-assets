<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENBA TikTok Preview 02</title>
  <link rel="stylesheet" href="preview.css">
</head>
<body data-group="2">
  <main class="shell">
    <section class="hero">
      <div class="hero-card">
        <div class="eyebrow">Preview HTML · Grupo 2</div>
        <h1 id="group-title"></h1>
        <p id="group-description"></p>
      </div>
      <div class="hero-stats">
        <div class="summary-card">
          <div class="summary-label">Bloque</div>
          <div class="summary-value">02</div>
          <div class="summary-note">Piezas de escuela y práctica real.</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Cantidad</div>
          <div class="summary-value" id="piece-count"></div>
          <div class="summary-note">Más autoridad cercana, sin ponerse rígidos.</div>
        </div>
      </div>
    </section>

    <nav class="nav" id="nav"></nav>

    <section class="group-meta">
      <div>
        <h2>Revisión editorial</h2>
        <p>Acá ENBA muestra oficio: timón, maniobra, práctica y aprendizaje. El desafío es que siga sintiéndose TikTok nativo y no brochure.</p>
      </div>
      <div class="group-pill" id="group-pill"></div>
    </section>

    <section class="pieces-grid" id="pieces"></section>
  </main>
  <script src="tiktok-pieces.js"></script>
  <script src="preview.js"></script>
</body>
</html>
