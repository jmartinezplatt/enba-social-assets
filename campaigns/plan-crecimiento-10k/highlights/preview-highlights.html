<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ENBA — Highlight Covers Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060e18;
    font-family: Arial, sans-serif;
    padding: 48px 40px;
    color: #E8EDF2;
  }
  header {
    margin-bottom: 48px;
    border-bottom: 1px solid #1e2f40;
    padding-bottom: 24px;
  }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #4DB8A0; }
  header p { font-size: 12px; color: #4a5f70; margin-top: 6px; letter-spacing: 1px; }

  /* ── GRID FULL SIZE ── */
  .section-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #3a5060;
    margin-bottom: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 64px;
  }
  .card { position: relative; }
  .card img {
    width: 100%;
    display: block;
    border-radius: 12px;
    border: 1px solid #1a2a38;
  }
  .card .badge {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: rgba(6,14,24,0.82);
    backdrop-filter: blur(4px);
    border: 1px solid #1e2f40;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #8aa8bc;
  }

  /* ── IG CIRCLE SIMULATION ── */
  .ig-section { margin-bottom: 64px; }
  .ig-strip {
    display: flex;
    gap: 28px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .ig-item { text-align: center; width: 96px; }
  .ig-ring {
    width: 88px; height: 88px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(45deg, #4DB8A0, #2E817D, #D4A843);
    margin: 0 auto 8px;
  }
  .ig-circle {
    width: 100%; height: 100%;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid #060e18;
  }
  .ig-circle img { width: 100%; height: 100%; object-fit: cover; }
  .ig-label {
    font-size: 10px;
    color: #8aa8bc;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── ZOOM LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(6,14,24,0.96);
    z-index: 999;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    max-width: 90vmin;
    max-height: 90vmin;
    border-radius: 16px;
    box-shadow: 0 0 80px rgba(0,0,0,0.8);
  }
</style>
</head>
<body>

<header>
  <h1>ENBA — Highlight Covers</h1>
  <p>6 covers · 1080 × 1080 px · Renderizados con Playwright · Click para zoom</p>
</header>

<p class="section-title">Full resolution</p>
<div class="grid">
  <div class="card">
    <img src="highlight-travesias.png" onclick="zoom(this)">
    <span class="badge">Travesías</span>
  </div>
  <div class="card">
    <img src="highlight-paseos.png" onclick="zoom(this)">
    <span class="badge">Paseos</span>
  </div>
  <div class="card">
    <img src="highlight-broker.png" onclick="zoom(this)">
    <span class="badge">Broker</span>
  </div>
  <div class="card">
    <img src="highlight-escuela.png" onclick="zoom(this)">
    <span class="badge">Escuela</span>
  </div>
  <div class="card">
    <img src="highlight-services.png" onclick="zoom(this)">
    <span class="badge">Services</span>
  </div>
  <div class="card">
    <img src="highlight-quienes-somos.png" onclick="zoom(this)">
    <span class="badge">¿Quiénes somos?</span>
  </div>
</div>

<div class="ig-section">
  <p class="section-title">Simulación perfil IG</p>
  <div class="ig-strip">
    <div class="ig-item">
      <div class="ig-ring"><div class="ig-circle"><img src="highlight-travesias.png"></div></div>
      <div class="ig-label">Travesías</div>
    </div>
    <div class="ig-item">
      <div class="ig-ring"><div class="ig-circle"><img src="highlight-paseos.png"></div></div>
      <div class="ig-label">Paseos</div>
    </div>
    <div class="ig-item">
      <div class="ig-ring"><div class="ig-circle"><img src="highlight-broker.png"></div></div>
      <div class="ig-label">Broker</div>
    </div>
    <div class="ig-item">
      <div class="ig-ring"><div class="ig-circle"><img src="highlight-escuela.png"></div></div>
      <div class="ig-label">Escuela</div>
    </div>
    <div class="ig-item">
      <div class="ig-ring"><div class="ig-circle"><img src="highlight-services.png"></div></div>
      <div class="ig-label">Services</div>
    </div>
    <div class="ig-item">
      <div class="ig-ring"><div class="ig-circle"><img src="highlight-quienes-somos.png"></div></div>
      <div class="ig-label">¿Quiénes somos?</div>
    </div>
  </div>
</div>

<div id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="">
</div>

<script>
  function zoom(el) {
    document.getElementById('lightbox-img').src = el.src;
    document.getElementById('lightbox').classList.add('open');
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
  });
</script>
</body>
</html>
