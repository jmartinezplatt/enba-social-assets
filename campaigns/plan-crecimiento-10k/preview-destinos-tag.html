<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ENBA — Tagear Destinos</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #fff; font-family: system-ui; }
.header { position: sticky; top: 0; background: #111; padding: 1rem 2rem; border-bottom: 1px solid #333; z-index: 100; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
.header h1 { font-size: 1.1rem; margin-right: 1rem; }
.filter-btn { padding: 6px 14px; border: 1px solid #555; border-radius: 20px; background: none; color: #aaa; cursor: pointer; font-size: 0.8rem; }
.filter-btn:hover { border-color: #4fc3f7; color: #4fc3f7; }
.filter-btn.active { background: #4fc3f7; color: #111; border-color: #4fc3f7; }
.stats { color: #888; font-size: 0.85rem; margin-left: auto; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 4px; padding: 1rem; }
.card { position: relative; cursor: pointer; border: 2px solid transparent; border-radius: 4px; overflow: hidden; }
.card:hover { border-color: #4fc3f7; }
.card img { width: 100%; height: 220px; object-fit: cover; display: block; }
.card .label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); padding: 4px 8px; font-size: 0.65rem; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card .tag-badge { position: absolute; top: 4px; right: 4px; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; }
.tag-lacaze { background: #e91e63; color: #fff; }
.tag-colonia { background: #ff9800; color: #111; }
.tag-riachuelo { background: #4caf50; color: #fff; }
.tag-pajarito { background: #2196f3; color: #fff; }
.tag-zarpada { background: #9c27b0; color: #fff; }
.tag-bsas { background: #ffeb3b; color: #111; }
.tag-martingarcia { background: #00bcd4; color: #fff; }
.tag-carmelo { background: #ff5722; color: #fff; }
.tag-mdq { background: #8bc34a; color: #111; }
.tag-destinos { background: #607d8b; color: #fff; }
.tag-sintagear { background: #555; color: #aaa; }
.modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 200; justify-content: center; align-items: center; flex-direction: column; }
.modal.open { display: flex; }
.modal img { max-width: 90vw; max-height: 65vh; object-fit: contain; }
.modal .actions { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; justify-content: center; }
.modal .tag-btn { padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer; font-size: 1rem; font-weight: bold; }
.modal .close-btn { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; }
.modal .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 2rem; cursor: pointer; padding: 1rem; }
.modal .nav-btn.prev { left: 1rem; }
.modal .nav-btn.next { right: 1rem; }
.modal .filename { color: #aaa; margin-top: 0.5rem; font-size: 0.8rem; }
.export-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #222; padding: 1rem 2rem; border-top: 1px solid #333; z-index: 100; display: flex; gap: 1rem; align-items: center; }
.export-btn { padding: 8px 20px; background: #4fc3f7; color: #111; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<div class="header">
  <h1>Tagear Destinos</h1>
  <button class="filter-btn active" onclick="filterAll()">Todas</button>
  <button class="filter-btn" onclick="filterTag('sintagear')">Sin tagear</button>
  <button class="filter-btn" onclick="filterTag('lacaze')">Lacaze</button>
  <button class="filter-btn" onclick="filterTag('colonia')">Colonia</button>
  <button class="filter-btn" onclick="filterTag('riachuelo')">Riachuelo</button>
  <button class="filter-btn" onclick="filterTag('pajarito')">Pajarito</button>
  <button class="filter-btn" onclick="filterTag('zarpada')">Zarpada</button>
  <button class="filter-btn" onclick="filterTag('bsas')">BsAs</button>
  <button class="filter-btn" onclick="filterTag('martingarcia')">M.García</button>
  <button class="filter-btn" onclick="filterTag('carmelo')">Carmelo</button>
  <button class="filter-btn" onclick="filterTag('mdq')">MDQ</button>
  <button class="filter-btn" onclick="filterTag('destinos')">Destinos</button>
  <div class="stats" id="stats"></div>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <button class="close-btn" onclick="closeModal()">&times;</button>
  <button class="nav-btn prev" onclick="navPrev()">&#8249;</button>
  <button class="nav-btn next" onclick="navNext()">&#8250;</button>
  <img id="modal-img" src="">
  <div class="filename" id="modal-filename"></div>
  <div class="actions" id="modal-actions"></div>
</div>

<div class="export-bar">
  <button class="export-btn" onclick="exportTags()">Exportar tags (JSON)</button>
  <div class="stats" id="export-stats"></div>
</div>

  {idx: 70, src: "../../asset-bank/marina-muelle-madera-veleros-nubes.jpg", name: "marina-muelle-madera-veleros-nubes.jpg"},
];

const tags = ["lacaze", "colonia", "riachuelo", "pajarito", "zarpada", "bsas", "martingarcia", "carmelo", "mdq", "destinos"];
const tagColors = {
  lacaze: '#e91e63',
  colonia: '#ff9800',
  riachuelo: '#4caf50',
  pajarito: '#2196f3',
  zarpada: '#9c27b0',
  bsas: '#ffeb3b',
  martingarcia: '#00bcd4',
  carmelo: '#ff5722',
  mdq: '#8bc34a',
  destinos: '#607d8b'
};
const tagLabels = {
  lacaze: 'Lacaze',
  colonia: 'Colonia',
  riachuelo: 'Riachuelo',
  pajarito: 'Pajarito',
  zarpada: 'Zarpada',
  bsas: 'BsAs',
  martingarcia: 'M.García',
  carmelo: 'Carmelo',
  mdq: 'MDQ',
  destinos: 'Destinos'
};

const classifications = JSON.parse(localStorage.getItem('enba-destinos-tags') || '{}');
let currentFilter = 'all';
let currentIdx = -1;
let filteredPhotos = [...photos];

function save() {
  localStorage.setItem('enba-destinos-tags', JSON.stringify(classifications));
  updateStats();
}

function updateStats() {
  const byTag = {};
  let tagged = 0;
  for (const [k, v] of Object.entries(classifications)) {
    byTag[v] = (byTag[v] || 0) + 1;
    tagged++;
  }
  document.getElementById('stats').textContent = `${tagged}/${photos.length} tageadas`;
  let exportStats = Object.entries(byTag).map(([t, n]) => `${tagLabels[t] || t}: ${n}`).join(' | ');
  document.getElementById('export-stats').textContent = exportStats;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  filteredPhotos = photos.filter(p => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'sintagear') return !classifications[p.idx];
    return classifications[p.idx] === currentFilter;
  });

  for (const p of filteredPhotos) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<img src="${p.src}" loading="lazy"><div class="label">${p.name}</div>`;
    const tag = classifications[p.idx];
    if (tag) {
      card.innerHTML += `<div class="tag-badge tag-${tag}">${tagLabels[tag]}</div>`;
    }
    card.onclick = () => openModal(p.idx);
    grid.appendChild(card);
  }
  updateStats();
}

function openModal(idx) {
  currentIdx = idx;
  const p = photos[idx];
  document.getElementById('modal-img').src = p.src;
  document.getElementById('modal-filename').textContent = p.name;
  const actions = document.getElementById('modal-actions');
  actions.innerHTML = '';
  for (const tag of tags) {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.style.background = tagColors[tag];
    btn.style.color = tag === 'colonia' ? '#111' : '#fff';
    btn.textContent = tagLabels[tag];
    if (classifications[idx] === tag) btn.style.outline = '3px solid #fff';
    btn.onclick = () => { classifications[idx] = tag; save(); navNext(); };
    actions.appendChild(btn);
  }
  // Clear button
  const clearBtn = document.createElement('button');
  clearBtn.className = 'tag-btn';
  clearBtn.style.background = '#555';
  clearBtn.style.color = '#fff';
  clearBtn.textContent = 'Limpiar';
  clearBtn.onclick = () => { delete classifications[idx]; save(); navNext(); };
  actions.appendChild(clearBtn);

  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); renderGrid(); }
function navNext() {
  const currFiltered = filteredPhotos.findIndex(p => p.idx === currentIdx);
  if (currFiltered < filteredPhotos.length - 1) openModal(filteredPhotos[currFiltered + 1].idx);
  else closeModal();
}
function navPrev() {
  const currFiltered = filteredPhotos.findIndex(p => p.idx === currentIdx);
  if (currFiltered > 0) openModal(filteredPhotos[currFiltered - 1].idx);
}

function filterAll() { currentFilter = 'all'; renderGrid(); updateFilterBtns('all'); }
function filterTag(t) { currentFilter = t; renderGrid(); updateFilterBtns(t); }
function updateFilterBtns(active) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function exportTags() {
  const result = {};
  for (const [idx, tag] of Object.entries(classifications)) {
    const p = photos[parseInt(idx)];
    if (p) result[p.name] = tag;
  }
  const blob = new Blob([JSON.stringify(result, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'enba-destinos-tags.json';
  a.click();
}

document.addEventListener('keydown', e => {
  if (currentIdx === -1) return;
  if (e.key === 'ArrowRight') navNext();
  if (e.key === 'ArrowLeft') navPrev();
  if (e.key === 'Escape') closeModal();
  if (e.key === '1') { classifications[currentIdx] = 'lacaze'; save(); navNext(); }
  if (e.key === '2') { classifications[currentIdx] = 'colonia'; save(); navNext(); }
  if (e.key === '3') { classifications[currentIdx] = 'riachuelo'; save(); navNext(); }
  if (e.key === '4') { classifications[currentIdx] = 'pajarito'; save(); navNext(); }
  if (e.key === '5') { classifications[currentIdx] = 'zarpada'; save(); navNext(); }
  if (e.key === '6') { classifications[currentIdx] = 'bsas'; save(); navNext(); }
  if (e.key === '7') { classifications[currentIdx] = 'martingarcia'; save(); navNext(); }
  if (e.key === '8') { classifications[currentIdx] = 'carmelo'; save(); navNext(); }
  if (e.key === '9') { classifications[currentIdx] = 'mdq'; save(); navNext(); }
  if (e.key === 'd') { classifications[currentIdx] = 'destinos'; save(); navNext(); }
  if (e.key === '0') { delete classifications[currentIdx]; save(); navNext(); }
});

renderGrid();
</script>

</html>
